#   - Set to 0 (or omit this file entirely) to run in zero-shot mode.
#
# For each task, list example images and their ground-truth answer strings.
# The 'images' list contains paths to all images for the sample (single-image).
# The 'answer' should be the raw string the model is expected to output.

