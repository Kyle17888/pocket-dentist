# DenPAR Pipeline Global Configuration
# ======================================
# DenPAR dataset evaluation pipeline.
# Tasks: Tooth counting + Arch classification + Site classification

data:
  # Image root directory (JSONL image paths are relative to this)
  image_dir: "<DATA_ROOT>/DenPAR/output"
  test_file: "<DATA_ROOT>/DenPAR/output/test.jsonl"
  train_file: "<DATA_ROOT>/DenPAR/output/train.jsonl"

inference:
  max_new_tokens: 128       # Short answers: number or label
  temperature: 0.0          # Deterministic output
  seed: 42

output_dir: "benchmark-denpar"

# API model configurations
api_models:
  gpt-4o-mini:
    served_model_name: "gpt-4o-mini"
    pricing:
      input_per_1m: 0.150
      output_per_1m: 0.600
  gemini-2.5-flash:
    served_model_name: "gemini-2.5-flash"
    pricing:
      input_per_1m: 0.300
      output_per_1m: 2.500
