# Few-shot configuration for DenPAR prediction tasks.
# All examples are from the Training split only (no data leakage).

num_shots: 0

denpar_count:
  examples:
    - images:
        - <DATA_ROOT>/DenPAR/output/images/2.jpg
      answer: "3"
    - images:
        - <DATA_ROOT>/DenPAR/output/images/9.jpg
      answer: "6"

denpar_arch:
  examples:
    - images:
        - <DATA_ROOT>/DenPAR/output/images/10.jpg
      answer: "Lower"
    - images:
        - <DATA_ROOT>/DenPAR/output/images/3.jpg
      answer: "Upper"

denpar_site:
  examples:
    - images:
        - <DATA_ROOT>/DenPAR/output/images/2.jpg
      answer: "Left"
    - images:
        - <DATA_ROOT>/DenPAR/output/images/1001.jpg
      answer: "Right"
