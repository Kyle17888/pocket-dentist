# BRAR Pipeline Global Configuration
# ===================================
# Periodontal Bone Resorption (BRAR) grading evaluation pipeline.
# Task: 3-class single-label classification (Grade 1, 2, 3)

data:
  # Image root directory (JSONL image paths are relative to this)
  # Local development:
  # Production:
  image_dir: "<DATA_ROOT>/BRAR"
  test_file: "<DATA_ROOT>/BRAR/test.jsonl"
  train_file: "<DATA_ROOT>/BRAR/train.jsonl"

inference:
  max_new_tokens: 256       # Enough for {"grade": X, "reason": "..."}
  temperature: 0.0          # Deterministic output
  seed: 42

output_dir: "benchmark-brar"

# API model configurations (for run_brar_api.sh)
api_models:
  gpt-4o-mini:
    served_model_name: "gpt-4o-mini"
    pricing:
      input_per_1m: 0.150
      output_per_1m: 0.600
  gemini-2.5-flash:
    served_model_name: "gemini-2.5-flash"
    pricing:
      input_per_1m: 0.300
      output_per_1m: 2.500
