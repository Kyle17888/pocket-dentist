# Few-shot configuration for DR classification.
#
# num_shots: how many examples to inject per query (0, 1, or 2).
#   - Must be <= the number of entries in each task's 'examples' list.
#   - Set to 0 (or omit this file entirely) to run in zero-shot mode.
#
# For each task, list example images and their ground-truth answer strings.
# The 'images' list contains paths to all images for the sample.
# The 'answer' should be the raw string the model is expected to output.
#
# Selected shots cover diverse label combinations:
#   Shot 1: multi-label (Fillings + Implant)
#   Shot 2: multi-label (Cavity + Impacted Tooth)

num_shots: 0

dr_classification:
  examples:
    - images:
        - <DATA_ROOT>/DR/output/images/train/0127_jpg.rf.873a19147a4c590209b7223049148158.jpg
      answer: "Cavity, Fillings, Impacted Tooth, Implant"
    - images:
        - <DATA_ROOT>/DR/output/images/train/0509_jpg.rf.3caceb5dbf28b366cf74910cae538326.jpg
      answer: "Cavity, Fillings, Impacted Tooth, Implant"
