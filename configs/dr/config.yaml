# DR Pipeline Global Configuration
# =====================================
# Dental Radiography (DR) multi-label classification pipeline.
# Task: Identify finding categories present in panoramic radiographs
# Classes: Cavity, Fillings, Impacted Tooth, Implant

data:
  # Image root directory (JSONL image paths are relative to this)
  image_dir: "<DATA_ROOT>/DR/output"
  test_file: "<DATA_ROOT>/DR/output/test.jsonl"
  train_file: "<DATA_ROOT>/DR/output/train.jsonl"

inference:
  max_new_tokens: 128       # Short answers: comma-separated label list
  temperature: 0.0          # Deterministic output
  seed: 42

output_dir: "results/datasets/dr"

# API model configurations
api_models:
  gpt-4o-mini:
    served_model_name: "gpt-4o-mini"
    pricing:
      input_per_1m: 0.150
      output_per_1m: 0.600
  gemini-2.5-flash:
    served_model_name: "gemini-2.5-flash"
    pricing:
      input_per_1m: 0.300
      output_per_1m: 2.500
